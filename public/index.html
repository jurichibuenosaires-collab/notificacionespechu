<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cocina · PechuFree</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=Figtree:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
--bg:#0a0a0a;
--surface:#141414;
--surface2:#1e1e1e;
--border:#2a2a2a;
--accent:#E8FF47;
--red:#ff4d4d;
--orange:#ff8c00;
--text:#f0f0f0;
--muted:#555;
--muted2:#777;
}
body{background:var(--bg);color:var(--text);font-family:'Figtree',sans-serif;min-height:100vh;overflow-x:hidden}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;letter-spacing:-0.5px;color:var(--text);text-transform:uppercase}
.logo em{color:var(--accent);font-style:normal}
.header-right{display:flex;align-items:center;gap:16px}
.badge{background:var(--accent);color:#000;font-family:'DM Mono',monospace;font-size:12px;font-weight:500;padding:3px 10px;border-radius:20px;min-width:28px;text-align:center}
.badge.zero{background:var(--surface2);color:var(--muted2)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:blink 2.5s ease-in-out infinite}
.dot.off{background:var(--red);animation:none}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.clock{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted2)}
main{padding:20px;max-width:1100px;margin:0 auto}
.empty{display:none;flex-direction:column;align-items:center;justify-content:center;padding:100px 20px;gap:10px;text-align:center}
.empty.on{display:flex}
.empty-check{width:64px;height:64px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;margin-bottom:8px}
.empty-check svg{width:28px;height:28px;stroke:var(--muted);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.empty h2{font-size:17px;font-weight:600;color:var(--muted2)}
.empty p{font-size:13px;color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;animation:pop .25s cubic-bezier(.34,1.56,.64,1);transition:opacity .2s,transform .2s;cursor:pointer}
.card:hover{border-color:#444}
.card.new-flash{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent);animation:pop .25s cubic-bezier(.34,1.56,.64,1), flash 1s ease forwards}
@keyframes flash{0%{box-shadow:0 0 0 1px var(--accent),0 0 20px #e8ff4740}100%{box-shadow:none;border-color:var(--border)}}
@keyframes pop{from{opacity:0;transform:scale(.95) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.card.done{opacity:.4;transform:scale(.97);pointer-events:none}
.card.received{border-color:#ff8c00;box-shadow:0 0 0 1px #ff8c0040}
.card.received .card-top{background:#1a1000}
.card-top{padding:16px 18px 12px;display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid var(--border)}
.order-num{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--accent);letter-spacing:-1px;line-height:1}
.order-time{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted2);margin-top:4px}
.timer{font-family:'DM Mono',monospace;font-size:12px;padding:5px 9px;border-radius:8px;background:var(--surface2);color:var(--muted2);border:1px solid var(--border);transition:all .3s}
.timer.hot{background:#2a0a00;color:#ff8c5a;border-color:#ff4d0030}
.card-customer{padding:12px 18px 0;font-size:13px;color:var(--muted2);font-weight:400}
.card-customer strong{color:var(--text);font-weight:600}
.items{padding:10px 18px 14px;display:flex;flex-direction:column;gap:7px}
.item{display:flex;gap:10px;align-items:baseline}
.qty{font-family:'DM Mono',monospace;font-size:13px;color:var(--accent);font-weight:500;min-width:22px;flex-shrink:0}
.iname{font-size:14px;font-weight:500;color:var(--text);line-height:1.35}
.iprop{font-size:12px;color:var(--muted2);font-style:italic;padding-left:32px}
.note-box{margin:0 18px 12px;background:#1e1800;border:1px solid #f59e0b25;border-radius:8px;padding:8px 12px;font-size:12px;color:#fbbf24;display:flex;gap:8px}
.divider{height:1px;background:var(--border);margin:0 18px}
.btn-recibido{display:block;width:calc(100% - 36px);margin:14px 18px 6px;padding:15px;background:#ff8c00;color:#000;font-family:'Figtree',sans-serif;font-size:15px;font-weight:700;border:none;border-radius:10px;cursor:pointer;letter-spacing:.3px;transition:opacity .15s,transform .1s;animation:pulseBtn 1.2s ease-in-out infinite}
.btn-recibido:active{opacity:.85;transform:scale(.98)}
@keyframes pulseBtn{0%,100%{box-shadow:0 0 0 0 #ff8c0060}50%{box-shadow:0 0 0 8px #ff8c0000}}
.btn-listo{display:block;width:calc(100% - 36px);margin:6px 18px 16px;padding:15px;background:var(--accent);color:#000;font-family:'Figtree',sans-serif;font-size:15px;font-weight:700;border:none;border-radius:10px;cursor:pointer;letter-spacing:.3px;transition:opacity .15s,transform .1s}
.btn-listo:active{opacity:.85;transform:scale(.98)}
.estado-recibido{display:block;width:calc(100% - 36px);margin:14px 18px 6px;padding:10px 18px;background:#1a1000;border:1px solid #ff8c0040;color:#ff8c00;font-family:'DM Mono',monospace;font-size:13px;font-weight:500;border-radius:10px;text-align:center}
.error-bar{background:#1a0606;border:1px solid #ff4d4d25;color:#ff8080;padding:10px 16px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none}
.error-bar.on{display:block}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--surface);border:1px solid var(--border);color:var(--text);padding:11px 20px;border-radius:10px;font-size:14px;font-weight:500;transition:transform .3s ease;z-index:9999;max-width:90vw;white-space:normal;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--accent);color:var(--accent)}
.toast.err{border-color:var(--red);color:var(--red)}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
@media(min-width:600px){.modal-overlay{align-items:center}}
.modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;padding:0 0 env(safe-area-inset-bottom,16px);animation:slideUp .25s cubic-bezier(.34,1.2,.64,1)}
@media(min-width:600px){.modal{border-radius:20px;max-height:85vh}}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0}
.modal-header{padding:16px 20px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start}
.modal-order-num{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--accent);letter-spacing:-1px}
.modal-close{background:var(--surface2);border:none;color:var(--muted2);font-size:18px;width:32px;height:32px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-section{padding:16px 20px;border-bottom:1px solid var(--border)}
.modal-section:last-child{border-bottom:none}
.modal-label{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.modal-value{font-size:15px;color:var(--text);font-weight:500;line-height:1.5}
.modal-value.muted{color:var(--muted2);font-size:13px;font-weight:400}
.tag-pickup{display:inline-block;background:#002a1a;color:#4ade80;border:1px solid #4ade8030;padding:4px 12px;border-radius:20px;font-size:13px;font-weight:600}
.tag-envio{display:inline-block;background:#001a2a;color:#60a5fa;border:1px solid #60a5fa30;padding:4px 12px;border-radius:20px;font-size:13px;font-weight:600}
.modal-items{display:flex;flex-direction:column;gap:8px}
.modal-item{display:flex;gap:10px;align-items:baseline}
.modal-btn-recibido{display:block;width:calc(100% - 40px);margin:8px 20px 4px;padding:16px;background:#ff8c00;color:#000;font-family:'Figtree',sans-serif;font-size:16px;font-weight:700;border:none;border-radius:12px;cursor:pointer;letter-spacing:.3px;transition:opacity .15s,transform .1s;animation:pulseBtn 1.2s ease-in-out infinite}
.modal-btn-recibido:active{opacity:.85;transform:scale(.98)}
.modal-btn-listo{display:block;width:calc(100% - 40px);margin:4px 20px 16px;padding:16px;background:var(--accent);color:#000;font-family:'Figtree',sans-serif;font-size:16px;font-weight:700;border:none;border-radius:12px;cursor:pointer;letter-spacing:.3px;transition:opacity .15s,transform .1s}
.modal-btn-listo:active{opacity:.85;transform:scale(.98)}
.modal-estado-recibido{display:block;width:calc(100% - 40px);margin:8px 20px 4px;padding:12px 20px;background:#1a1000;border:1px solid #ff8c0040;color:#ff8c00;font-family:'DM Mono',monospace;font-size:14px;font-weight:500;border-radius:12px;text-align:center}
.modal-note{background:#1e1800;border:1px solid #f59e0b25;border-radius:8px;padding:10px 12px;font-size:13px;color:#fbbf24}
.delivery-banner{background:#001a2a;border:1px solid #60a5fa30;border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px;font-size:14px;font-weight:700;color:#60a5fa}
.delivery-banner.pickup{background:#002a1a;border-color:#4ade8030;color:#4ade80}
.m-address-block{font-size:14px;color:var(--text);line-height:1.7}
.m-address-block .addr-line{display:flex;gap:8px;align-items:flex-start;margin-bottom:2px}
.m-address-block .addr-icon{font-size:13px;margin-top:1px;flex-shrink:0}
.m-address-block .addr-label{font-size:10px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
</style>
</head>
<body>
<header>
<div class="logo">Pechu<em>Free</em> · Cocina</div>
<div class="header-right">
<span class="clock" id="clock">--:--:--</span>
<div class="badge zero" id="badge">0</div>
<div class="dot" id="dot"></div>
</div>
</header>
<main>
<div class="error-bar" id="err"></div>
<div class="empty" id="empty">
<div class="empty-check">
<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
</div>
<h2>Sin pedidos pendientes</h2>
<p>Los pedidos nuevos aparecen acá automáticamente</p>
</div>
<div class="grid" id="grid"></div>
</main>

<!-- MODAL DETALLE -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
<div class="modal" id="modal">
<div class="modal-handle"></div>
<div class="modal-header">
<div>
<div class="modal-order-num" id="m-num">#0000</div>
<div style="font-size:12px;color:var(--muted2);margin-top:3px" id="m-time"></div>
</div>
<button class="modal-close" onclick="closeModalDirect()">✕</button>
</div>
<div class="modal-section" id="m-delivery-banner" style="display:none;padding:12px 20px">
<!-- banner envío, se llena por JS -->
</div>
<div class="modal-section">
<div class="modal-label">Cliente</div>
<div class="modal-value" id="m-name"></div>
<div class="modal-value muted" id="m-contact"></div>
</div>
<div class="modal-section" id="m-address-section" style="display:none">
<div class="modal-label">Dirección de entrega</div>
<div class="modal-value" id="m-address" style="line-height:1.6"></div>
</div>
<div class="modal-section" id="m-note-section" style="display:none">
<div class="modal-label">Nota del cliente</div>
<div class="modal-note" id="m-note"></div>
</div>
<div class="modal-section">
<div class="modal-label">Productos</div>
<div class="modal-items" id="m-items"></div>
</div>
<button class="modal-btn-recibido" id="m-btn-recibido" style="display:none">👀 &nbsp;Recibido — en preparación</button>
<div class="modal-estado-recibido" id="m-estado-recibido" style="display:none">🟠 En preparación...</div>
<button class="modal-btn-listo" id="m-btn-listo">✓ &nbsp;Listo para entregar</button>
</div>
</div>

<div class="toast" id="toast"></div>
<script>
const API = '/api/orders';
let known = {};
let receivedIds = new Set(); // pedidos marcados como recibidos en cocina
let audioCtx = null;
let firstLoad = true;
let currentModalId = null;
let bellInterval = null; // intervalo del timbre continuo

function getAudioCtx() {
if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
return audioCtx;
}

function playBell() {
try {
const ctx = getAudioCtx();
const t = ctx.currentTime;
[[880,0,0.4],[1760,0,0.2],[2640,0.05,0.1]].forEach(([freq, delay, gain]) => {
const osc = ctx.createOscillator();
const g = ctx.createGain();
osc.connect(g); g.connect(ctx.destination);
osc.frequency.value = freq;
osc.type = 'sine';
g.gain.setValueAtTime(gain, t + delay);
g.gain.exponentialRampToValueAtTime(0.001, t + delay + 1.8);
osc.start(t + delay);
osc.stop(t + delay + 1.8);
});
} catch(e) {}
}

// Chequea si hay pedidos pendientes (no recibidos), activa o detiene el timbre
function updateBellLoop() {
const pendingCount = Object.keys(known).filter(id => !receivedIds.has(String(id))).length;
if (pendingCount > 0) {
if (!bellInterval) {
playBell();
bellInterval = setInterval(playBell, 4000);
}
} else {
stopBell();
}
}

function stopBell() {
if (bellInterval) {
clearInterval(bellInterval);
bellInterval = null;
}
}

// Marcar pedido como "recibido en cocina" (solo interno, no llama a Shopify)
function markReceived(id) {
receivedIds.add(String(id));
// Actualizar card
const card = document.getElementById(`o-${id}`);
if (card) {
card.classList.add('received');
// Reemplazar btn-recibido por estado, dejar btn-listo
const btnR = card.querySelector('.btn-recibido');
if (btnR) {
const estadoEl = document.createElement('div');
estadoEl.className = 'estado-recibido';
estadoEl.textContent = '🟠 En preparación...';
btnR.replaceWith(estadoEl);
}
}
// Actualizar modal si está abierto para este pedido
if (currentModalId == id) {
const mBtnR = document.getElementById('m-btn-recibido');
const mEstado = document.getElementById('m-estado-recibido');
if (mBtnR) mBtnR.style.display = 'none';
if (mEstado) mEstado.style.display = '';
}
// Ver si ya no quedan pendientes → detener timbre
updateBellLoop();
toast('Pedido recibido en cocina 🟠', '', 2500);
}
function fmt(d) {
return new Date(d).toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
}
function elapsed(d) {
const m = Math.floor((Date.now() - new Date(d)) / 60000);
return m < 1 ? 'ahora' : m === 1 ? '1 min' : `${m} min`;
}
function isHot(d) {
return (Date.now() - new Date(d)) > 15 * 60000;
}
function toast(msg, type='', duration=3500) {
const el = document.getElementById('toast');
el.textContent = msg;
el.className = `toast show ${type}`;
setTimeout(() => el.className = 'toast', duration);
}

// --- MODAL ---
function openModal(id) {
const o = known[id];
if (!o) return;
currentModalId = id;

// Número y hora
document.getElementById('m-num').textContent = '#' + o.order_number;
document.getElementById('m-time').textContent = fmt(o.created_at) + ' · ' + elapsed(o.created_at);

// Detectar tipo de entrega
const shippingTitle = (o.shipping_lines?.[0]?.title || '').toLowerCase();
const isPickup = shippingTitle.includes('pickup') || shippingTitle.includes('pick up') ||
shippingTitle.includes('retiro') || shippingTitle.includes('retira') ||
shippingTitle.includes('en tienda') ||
(!o.shipping_address?.address1 && !shippingTitle.includes('delivery'));

// Banner de tipo de entrega
const bannerEl = document.getElementById('m-delivery-banner');
if (isPickup) {
bannerEl.style.display = '';
bannerEl.innerHTML = '<div class="delivery-banner pickup">📍 Pick Up en local</div>';
} else {
bannerEl.style.display = '';
bannerEl.innerHTML = '<div class="delivery-banner">🚚 Envío a domicilio</div>';
}

// Cliente
const firstName = o.billing_address?.first_name || o.shipping_address?.first_name || '';
const lastName = o.billing_address?.last_name || o.shipping_address?.last_name || '';
const fullName = [firstName, lastName].filter(Boolean).join(' ') || o.email?.split('@')[0] || 'Cliente';
document.getElementById('m-name').textContent = fullName;

const phone = o.phone || o.billing_address?.phone || o.shipping_address?.phone || '';
const contactParts = [];
if (phone) contactParts.push('📞 ' + phone);
if (o.email) contactParts.push('✉ ' + o.email);
document.getElementById('m-contact').innerHTML = contactParts.join('<br>');

// Dirección — solo si es envío a domicilio
const addrSection = document.getElementById('m-address-section');
const addrEl = document.getElementById('m-address');
if (!isPickup) {
const addr = o.shipping_address || o.billing_address;
if (addr) {
const lines = [];
const street = [addr.address1, addr.address2].filter(Boolean).join(', piso/depto ');
if (street) lines.push(`<div class="addr-line"><span class="addr-icon">📌</span><span>${street}</span></div>`);
const cityLine = [addr.city, addr.province, addr.zip].filter(Boolean).join(', ');
if (cityLine) lines.push(`<div class="addr-line"><span class="addr-icon">🏙</span><span>${cityLine}</span></div>`);
if (addr.country && addr.country !== 'Argentina') lines.push(`<div class="addr-line"><span class="addr-icon">🌎</span><span>${addr.country}</span></div>`);
addrEl.innerHTML = `<div class="m-address-block">${lines.join('')}</div>`;
} else {
addrEl.innerHTML = '<span style="color:var(--muted)">Sin dirección registrada</span>';
}
addrSection.style.display = '';
} else {
addrSection.style.display = 'none';
}

// Nota del cliente
const noteSection = document.getElementById('m-note-section');
// Buscar nota en o.note Y en attributes del pedido
const noteText = o.note || '';
const extraAttrs = (o.note_attributes || []).filter(a => a.value).map(a => `${a.name}: ${a.value}`).join('\n');
const fullNote = [noteText, extraAttrs].filter(Boolean).join('\n');
if (fullNote) {
document.getElementById('m-note').textContent = fullNote;
noteSection.style.display = '';
} else {
noteSection.style.display = 'none';
}

// Productos
const itemsEl = document.getElementById('m-items');
itemsEl.innerHTML = o.line_items.map(i => {
const props = (i.properties||[]).filter(p => p.value)
.map(p => `<div class="iprop">${p.name}: ${p.value}</div>`).join('');
return `<div class="modal-item"><span class="qty">${i.quantity}×</span><span class="iname">${i.name}</span></div>${props}`;
}).join('');

// Botones
const btnR = document.getElementById('m-btn-recibido');
const estadoR = document.getElementById('m-estado-recibido');
const btn = document.getElementById('m-btn-listo');

const isReceived = receivedIds.has(String(id));
btnR.style.display = isReceived ? 'none' : '';
estadoR.style.display = isReceived ? '' : 'none';
btnR.onclick = (e) => { e.stopPropagation(); markReceived(id); };
btn.onclick = (e) => { e.stopPropagation(); markDone(id); };

document.getElementById('modal-overlay').classList.add('open');
document.body.style.overflow = 'hidden';
}

function closeModal(e) {
if (e.target === document.getElementById('modal-overlay')) closeModalDirect();
}
function closeModalDirect() {
document.getElementById('modal-overlay').classList.remove('open');
document.body.style.overflow = '';
currentModalId = null;
}

function renderAll() {
const grid = document.getElementById('grid');
const empty = document.getElementById('empty');
const badge = document.getElementById('badge');
const list = Object.values(known).sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
badge.textContent = list.length;
badge.className = list.length ? 'badge' : 'badge zero';
if (!list.length) {
grid.innerHTML = '';
empty.classList.add('on');
return;
}
empty.classList.remove('on');
grid.querySelectorAll('.card').forEach(c => {
if (!known[c.dataset.id]) c.remove();
});
list.forEach(o => {
let card = document.getElementById(`o-${o.id}`);
const isNew = !card;
if (!card) {
card = document.createElement('div');
card.className = 'card' + (isNew && !firstLoad ? ' new-flash' : '');
card.id = `o-${o.id}`;
card.dataset.id = o.id;
card.onclick = () => openModal(o.id);
grid.prepend(card);
}
const hot = isHot(o.created_at);
const note = o.note || '';
const customer = o.billing_address?.first_name || o.shipping_address?.first_name || o.email?.split('@')[0] || 'Cliente';
const phone = o.phone || o.billing_address?.phone || o.shipping_address?.phone || '';

// Detectar tipo de entrega para mostrar en la card
const shippingTitle = (o.shipping_lines?.[0]?.title || '').toLowerCase();
const isPickup = shippingTitle.includes('pickup') || shippingTitle.includes('pick up') ||
shippingTitle.includes('retiro') || shippingTitle.includes('retira') ||
shippingTitle.includes('en tienda') ||
(!o.shipping_address?.address1 && !shippingTitle.includes('delivery'));
const deliveryBadge = isPickup
? '<span style="font-size:11px;background:#002a1a;color:#4ade80;padding:2px 8px;border-radius:10px;font-weight:600">Pick Up</span>'
: '<span style="font-size:11px;background:#001a2a;color:#60a5fa;padding:2px 8px;border-radius:10px;font-weight:600">Envío</span>';

const isReceived = receivedIds.has(String(o.id));
if (isReceived) card.classList.add('received');
const items = o.line_items.map(i => {
const props = (i.properties||[]).filter(p => p.value).map(p =>
`<div class="iprop">${p.name}: ${p.value}</div>`
).join('');
return `<div class="item"><span class="qty">${i.quantity}×</span><span class="iname">${i.name}</span></div>${props}`;
}).join('');
card.innerHTML = `
<div class="card-top">
<div>
<div class="order-num">#${o.order_number}</div>
<div class="order-time">${fmt(o.created_at)}</div>
</div>
<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
<div class="timer ${hot?'hot':''}" data-t="${o.created_at}">${elapsed(o.created_at)}</div>
${deliveryBadge}
</div>
</div>
<div class="card-customer">
<strong>${customer}</strong>
${!isPickup && (o.shipping_address?.address1 || o.billing_address?.address1) ? `<div style="font-size:12px;color:var(--muted2);margin-top:3px">📌 ${(o.shipping_address?.address1 || o.billing_address?.address1)}</div>` : ''}
${phone ? `<div style="font-size:12px;color:var(--muted2);margin-top:2px">📞 ${phone}</div>` : ''}
</div>
<div class="items">${items}</div>
${note ? `<div class="note-box">⚠ ${note}</div>` : ''}
<div class="divider"></div>
${isReceived
  ? `<div class="estado-recibido">🟠 En preparación...</div>`
  : `<button class="btn-recibido" onclick="event.stopPropagation();markReceived(${o.id})">👀 &nbsp;Recibido — en preparación</button>`
}
<button class="btn-listo" onclick="event.stopPropagation();markDone(${o.id})">✓ &nbsp;Listo para entregar</button>
`;
});
}

function tickTimers() {
document.querySelectorAll('.timer').forEach(el => {
const t = el.dataset.t;
if (!t) return;
el.textContent = elapsed(t);
el.className = `timer ${isHot(t)?'hot':''}`;
});
}

async function markDone(id) {
const card = document.getElementById(`o-${id}`);
if (card) card.classList.add('done');
// Cerrar modal si está abierto
if (currentModalId == id) closeModalDirect();
try {
const r = await fetch(API, {
method:'POST',
headers:{'Content-Type':'application/json'},
body: JSON.stringify({orderId: id, action:'fulfill'})
});
const data = await r.json().catch(() => ({}));
if (r.ok && data.ok) {
delete known[id];
receivedIds.delete(String(id));
renderAll();
updateBellLoop();
toast('Pedido entregado ✓', 'ok');
} else {
throw new Error(data.error || data.details?.errors || `Error ${r.status}`);
}
} catch(e) {
if (card) card.classList.remove('done');
const msg = e.message || 'Error al marcar el pedido';
toast(`Error: ${msg}`, 'err', 6000);
console.error('markDone error:', e);
}
}

async function fetchOrders() {
const dot = document.getElementById('dot');
const err = document.getElementById('err');
try {
const r = await fetch(API);
if (!r.ok) throw new Error(`HTTP ${r.status}`);
const data = await r.json();
dot.className = 'dot';
err.classList.remove('on');
const incoming = {};
(data.orders || []).forEach(o => { incoming[o.id] = o; });
let hasNew = false;
Object.keys(incoming).forEach(id => { if (!known[id]) hasNew = true; });
// Limpiar receivedIds que ya no existen (fueron fulfillados)
for (const id of receivedIds) {
  if (!incoming[id]) receivedIds.delete(id);
}
known = incoming;
renderAll();
if (hasNew && !firstLoad) updateBellLoop();
else if (!firstLoad) updateBellLoop();
firstLoad = false;
} catch(e) {
dot.className = 'dot off';
err.textContent = `Sin conexión. Reintentando... (${e.message})`;
err.classList.add('on');
}
}

setInterval(() => {
document.getElementById('clock').textContent =
new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}, 1000);
document.addEventListener('touchstart', () => { try { getAudioCtx(); } catch(e){} }, {once:true});
document.addEventListener('click', () => { try { getAudioCtx(); } catch(e){} }, {once:true});
fetchOrders();
setInterval(fetchOrders, 15000);
setInterval(tickTimers, 30000);
</script>
</body>
</html>
